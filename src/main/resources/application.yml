spring:
  application:
    name: giwon-assistant-api

management:
  endpoints:
    web:
      exposure:
        include: health,info

assistant:
  integrations:
    openai-enabled: false
    weather-enabled: true
    calendar-enabled: false
  weather:
    location-name: Seoul
    latitude: 37.5665
    longitude: 126.9780
  calendar:
    timezone: Asia/Seoul
    default-events:
      - time: "10:00"
        title: "프로젝트 구조 정리"
      - time: "15:00"
        title: "개인 서비스 점검"
  openai:
    model: gpt-4.1
