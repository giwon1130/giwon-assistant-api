spring:
  application:
    name: giwon-assistant-api
  datasource:
    url: ${ASSISTANT_DB_URL:jdbc:h2:file:./data/giwon-assistant;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${ASSISTANT_DB_USERNAME:sa}
    password: ${ASSISTANT_DB_PASSWORD:}
    driver-class-name: ${ASSISTANT_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

assistant:
  integrations:
    openai-enabled: false
    weather-enabled: true
    calendar-enabled: false
    news-enabled: true
  weather:
    location-name: Seoul
    latitude: 37.5665
    longitude: 126.9780
  news:
    rss-url: https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko
    limit: 3
  calendar:
    timezone: Asia/Seoul
    default-events:
      - time: "10:00"
        title: "프로젝트 구조 정리"
      - time: "15:00"
        title: "개인 서비스 점검"
  openai:
    model: gpt-4.1
