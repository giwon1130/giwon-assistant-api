spring:
  application:
    name: giwon-assistant-api
  datasource:
    url: ${ASSISTANT_DB_URL:jdbc:h2:file:./data/giwon-assistant;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${ASSISTANT_DB_USERNAME:sa}
    password: ${ASSISTANT_DB_PASSWORD:}
    driver-class-name: ${ASSISTANT_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

assistant:
  integrations:
    gemini-enabled: ${ASSISTANT_INTEGRATIONS_GEMINI_ENABLED:false}
    openai-enabled: ${ASSISTANT_INTEGRATIONS_OPENAI_ENABLED:false}
    claude-enabled: ${ASSISTANT_INTEGRATIONS_CLAUDE_ENABLED:false}
    weather-enabled: true
    calendar-enabled: false
    news-enabled: true
  briefing-schedule:
    enabled: true
    cron: "0 0 8 * * *"
    zone: Asia/Seoul
  weather:
    location-name: Seoul
    latitude: 37.5665
    longitude: 126.9780
  news:
    rss-url: https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko
    limit: 3
  calendar:
    timezone: Asia/Seoul
    calendar-id: ${ASSISTANT_CALENDAR_ID:primary}
    client-id: ${ASSISTANT_GOOGLE_CLIENT_ID:}
    client-secret: ${ASSISTANT_GOOGLE_CLIENT_SECRET:}
    refresh-token: ${ASSISTANT_GOOGLE_REFRESH_TOKEN:}
    default-events:
      - time: "10:00"
        title: "프로젝트 구조 정리"
      - time: "15:00"
        title: "개인 서비스 점검"
  openai:
    model: ${ASSISTANT_OPENAI_MODEL:gpt-4.1}
  gemini:
    model: ${ASSISTANT_GEMINI_MODEL:gemini-2.0-flash}
  anthropic:
    model: ${ASSISTANT_ANTHROPIC_MODEL:claude-sonnet-4-5}
  slack:
    enabled: ${ASSISTANT_SLACK_ENABLED:false}
    webhook-url: ${ASSISTANT_SLACK_WEBHOOK_URL:}
  notion:
    enabled: ${ASSISTANT_NOTION_ENABLED:false}
    token: ${ASSISTANT_NOTION_TOKEN:}
    briefing-database-id: ${ASSISTANT_NOTION_BRIEFING_DB_ID:33e13ab5-11c3-814f-8705-d6425a7711cf}
    idea-database-id: ${ASSISTANT_NOTION_IDEA_DB_ID:33e13ab5-11c3-8159-8900-cd11190c6076}
