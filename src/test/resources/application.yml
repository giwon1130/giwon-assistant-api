spring:
  datasource:
    url: jdbc:h2:mem:giwon-assistant-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

assistant:
  integrations:
    openai-enabled: false
    weather-enabled: false
    calendar-enabled: false
    news-enabled: false
  weather:
    location-name: Seoul
    latitude: 37.5665
    longitude: 126.9780
  calendar:
    timezone: Asia/Seoul
    default-events:
      - time: "10:00"
        title: "프로젝트 구조 정리"
      - time: "15:00"
        title: "개인 서비스 점검"
  openai:
    model: gpt-4.1
