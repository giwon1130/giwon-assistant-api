services:
  postgres:
    image: postgres:16-alpine
    container_name: giwon-assistant-postgres
    environment:
      POSTGRES_DB: giwon_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - giwon-assistant-postgres-data:/var/lib/postgresql/data

  giwon-assistant-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giwon-assistant-api
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      ASSISTANT_DB_URL: jdbc:postgresql://postgres:5432/giwon_assistant
      ASSISTANT_DB_USERNAME: postgres
      ASSISTANT_DB_PASSWORD: postgres
      # Gemini
      ASSISTANT_INTEGRATIONS_GEMINI_ENABLED: ${ASSISTANT_INTEGRATIONS_GEMINI_ENABLED:-false}
      ASSISTANT_GEMINI_MODEL: ${ASSISTANT_GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # OpenAI
      ASSISTANT_INTEGRATIONS_OPENAI_ENABLED: ${ASSISTANT_INTEGRATIONS_OPENAI_ENABLED:-false}
      ASSISTANT_OPENAI_MODEL: ${ASSISTANT_OPENAI_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Claude (Anthropic)
      ASSISTANT_INTEGRATIONS_CLAUDE_ENABLED: ${ASSISTANT_INTEGRATIONS_CLAUDE_ENABLED:-false}
      ASSISTANT_ANTHROPIC_MODEL: ${ASSISTANT_ANTHROPIC_MODEL:-claude-sonnet-4-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Google Calendar
      ASSISTANT_INTEGRATIONS_CALENDAR_ENABLED: ${ASSISTANT_INTEGRATIONS_CALENDAR_ENABLED:-false}
      ASSISTANT_GOOGLE_CLIENT_ID: ${ASSISTANT_GOOGLE_CLIENT_ID:-}
      ASSISTANT_GOOGLE_CLIENT_SECRET: ${ASSISTANT_GOOGLE_CLIENT_SECRET:-}
      ASSISTANT_GOOGLE_REFRESH_TOKEN: ${ASSISTANT_GOOGLE_REFRESH_TOKEN:-}
      ASSISTANT_CALENDAR_ID: ${ASSISTANT_CALENDAR_ID:-primary}
      # Notion
      ASSISTANT_NOTION_ENABLED: ${ASSISTANT_NOTION_ENABLED:-false}
      ASSISTANT_NOTION_TOKEN: ${ASSISTANT_NOTION_TOKEN:-}
      ASSISTANT_NOTION_BRIEFING_DB_ID: ${ASSISTANT_NOTION_BRIEFING_DB_ID:-}
      ASSISTANT_NOTION_IDEA_DB_ID: ${ASSISTANT_NOTION_IDEA_DB_ID:-}
    ports:
      - "8080:8080"

volumes:
  giwon-assistant-postgres-data:
